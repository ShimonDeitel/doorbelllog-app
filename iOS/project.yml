name: Doorbelllog
options:
  bundleIdPrefix: com.shimondeitel.doorbellcamlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Doorbelllog:
    type: application
    platform: iOS
    sources:
      - path: Doorbelllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorbellcamlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Doorbelllog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DoorbelllogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoorbelllogTests
      - path: Doorbelllog.storekit
    dependencies:
      - target: Doorbelllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorbellcamlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DoorbelllogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DoorbelllogUITests
    dependencies:
      - target: Doorbelllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorbellcamlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Doorbelllog:
    build:
      targets:
        Doorbelllog: all
        DoorbelllogTests: [test]
        DoorbelllogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Doorbelllog.storekit
    test:
      config: Debug
      storeKitConfiguration: Doorbelllog.storekit
      targets:
        - DoorbelllogTests
        - DoorbelllogUITests
    archive:
      config: Release
